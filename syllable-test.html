
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllable Tester - ReadSmart V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .test-area {
            padding: 40px;
        }
        
        .input-group {
            margin-bottom: 30px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }
        
        .input-row {
            display: flex;
            gap: 15px;
            align-items: stretch;
        }
        
        #wordInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 1.2em;
            transition: all 0.3s ease;
            outline: none;
        }
        
        #wordInput:focus {
            border-color: #4285F4;
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
        }
        
        .test-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #4285F4, #1a73e8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }
        
        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(66, 133, 244, 0.3);
        }
        
        .test-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .results {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            border-left: 5px solid #34A853;
        }
        
        .result-word {
            font-size: 2em;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .result-syllables {
            font-size: 1.5em;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 2px dashed #4285F4;
        }
        
        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .detail-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e1e5e9;
        }
        
        .detail-label {
            font-weight: 600;
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .detail-value {
            font-size: 1.1em;
            color: #333;
            margin-top: 5px;
        }
        
        .error {
            background: #fee;
            border-left-color: #dc3545;
            color: #721c24;
        }
        
        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
        }
        
        .quick-tests {
            margin-top: 30px;
            padding: 25px;
            background: #f1f3f4;
            border-radius: 15px;
        }
        
        .quick-tests h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .quick-words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .quick-word {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e1e5e9;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .quick-word:hover {
            border-color: #4285F4;
            background: #f8f9ff;
            transform: translateY(-1px);
        }
        
        @media (max-width: 600px) {
            .input-row {
                flex-direction: column;
            }
            
            .test-btn {
                width: 100%;
            }
            
            .result-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔤 Syllable Tester</h1>
            <p>Test the V2 Syllabification System</p>
        </div>
        
        <div class="test-area">
            <div class="input-group">
                <label for="wordInput">Enter a word to test:</label>
                <div class="input-row">
                    <input type="text" id="wordInput" placeholder="Type any word..." autocomplete="off">
                    <button class="test-btn" onclick="testWord()">Test Word</button>
                </div>
            </div>
            
            <div id="results" style="display: none;"></div>
            
            <div class="quick-tests">
                <h3>Quick Test Words:</h3>
                <div class="quick-words">
                    <span class="quick-word" onclick="testQuickWord('spurious')">spurious</span>
                    <span class="quick-word" onclick="testQuickWord('curious')">curious</span>
                    <span class="quick-word" onclick="testQuickWord('furious')">furious</span>
                    <span class="quick-word" onclick="testQuickWord('glorious')">glorious</span>
                    <span class="quick-word" onclick="testQuickWord('international')">international</span>
                    <span class="quick-word" onclick="testQuickWord('surprisingly')">surprisingly</span>
                    <span class="quick-word" onclick="testQuickWord('mathematics')">mathematics</span>
                    <span class="quick-word" onclick="testQuickWord('beautiful')">beautiful</span>
                    <span class="quick-word" onclick="testQuickWord('education')">education</span>
                    <span class="quick-word" onclick="testQuickWord('experience')">experience</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        
        document.getElementById('wordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                testWord();
            }
        });
        
        async function testWord() {
            const input = document.getElementById('wordInput');
            const word = input.value.trim();
            
            if (!word) {
                alert('Please enter a word to test');
                return;
            }
            
            const resultsDiv = document.getElementById('results');
            const testBtn = document.querySelector('.test-btn');
            
            // Show loading state
            testBtn.disabled = true;
            testBtn.textContent = 'Testing...';
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<div class="loading">Testing syllabification...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/word/${encodeURIComponent(word)}`);
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data);
                } else {
                    displayError(data.message || 'Unknown error occurred');
                }
            } catch (error) {
                console.error('Test error:', error);
                displayError('Failed to connect to server. Make sure the app is running.');
            } finally {
                testBtn.disabled = false;
                testBtn.textContent = 'Test Word';
            }
        }
        
        function testQuickWord(word) {
            document.getElementById('wordInput').value = word;
            testWord();
        }
        
        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            
            const syllableDisplay = data.syllables ? data.syllables.join(' • ') : 'No syllables found';
            
            resultsDiv.innerHTML = `
                <div class="result-word">${data.word}</div>
                <div class="result-syllables">${syllableDisplay}</div>
                <div class="result-details">
                    <div class="detail-item">
                        <div class="detail-label">Syllable Count</div>
                        <div class="detail-value">${data.syllables ? data.syllables.length : 0}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Pronunciation</div>
                        <div class="detail-value">/${data.pronunciation || 'N/A'}/</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Definition</div>
                        <div class="detail-value">${data.definition ? data.definition.substring(0, 100) + '...' : 'Not available'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">System Version</div>
                        <div class="detail-value">V2 (Modular)</div>
                    </div>
                </div>
            `;
        }
        
        function displayError(message) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="results error">
                    <strong>Error:</strong> ${message}
                </div>
            `;
        }
        
        // Auto-focus the input on page load
        window.addEventListener('load', () => {
            document.getElementById('wordInput').focus();
        });
    </script>
</body>
</html>
